<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GDBlitz</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap');

    :root {
      --bg: #1a0a2e;
      --surface: #1f0f3a;
      --surface2: #2a1250;
      --accent: #e94560;
      --accent2: #f5a623;
      --accent3: #00d4ff;
      --green: #00e676;
      --purple: #9b59b6;
      --purple-light: #c39bd3;
      --text: #f0e6ff;
      --text-dim: rgba(240,230,255,0.45);
      --border: rgba(180,120,255,0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* GEOMETRIC BG */
    canvas#bgCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.18;
    }

    /* HEADER */
    header {
      position: relative; z-index: 10;
      padding: 0 40px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(20,6,38,0.92);
      border-bottom: 2px solid rgba(180,100,255,0.35);
    }

    .logo {
      font-family: 'Nunito', sans-serif;
      font-size: 1.7rem; font-weight: 900;
      letter-spacing: 3px;
      color: #fff;
      text-shadow: 0 0 24px rgba(180,100,255,0.7), 0 0 2px #fff;
    }
    .logo span { color: var(--accent); }

    .header-right { display: flex; gap: 10px; align-items: center; }

    .user-badge {
      font-size: 12px; color: var(--text-dim);
      background: rgba(255,255,255,0.04);
      padding: 6px 14px; border-radius: 6px;
      border: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .user-badge strong { color: var(--purple-light); }

    /* TUBE BUTTON */
    .btn-tube {
      font-family: 'Nunito', sans-serif; font-weight: 800;
      font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 8px 20px;
      border-radius: 30px;
      border: 2px solid #4da6ff;
      background: linear-gradient(180deg, #1a6fd4 0%, #0d4fa3 50%, #1a6fd4 100%);
      color: #cce8ff;
      cursor: pointer;
      box-shadow:
        0 2px 0 #0a3a7a,
        0 0 0 1px rgba(100,180,255,0.2),
        inset 0 1px 0 rgba(255,255,255,0.25),
        inset 0 -1px 0 rgba(0,0,0,0.3);
      transition: all 0.12s;
      text-shadow: 0 1px 2px rgba(0,0,40,0.6);
    }
    .btn-tube:hover {
      background: linear-gradient(180deg, #2a80e4 0%, #1a5fc0 50%, #2a80e4 100%);
      box-shadow:
        0 2px 0 #0a3a7a,
        0 0 10px rgba(77,166,255,0.5),
        inset 0 1px 0 rgba(255,255,255,0.3),
        inset 0 -1px 0 rgba(0,0,0,0.3);
      transform: translateY(-1px);
    }
    .btn-tube:active { transform: translateY(1px); box-shadow: 0 0 0 #0a3a7a, inset 0 2px 4px rgba(0,0,0,0.4); }

    /* REGULAR BUTTONS */
    .btn {
      font-family: 'Nunito', sans-serif; font-weight: 800;
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
      padding: 10px 22px; border-radius: 8px; border: none;
      cursor: pointer; transition: all 0.12s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #e94560, #c0304a);
      color: #fff;
      box-shadow: 0 3px 12px rgba(233,69,96,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(233,69,96,0.5); }
    .btn-green {
      background: linear-gradient(135deg, #00c853, #00994a);
      color: #001a00;
      box-shadow: 0 3px 12px rgba(0,200,83,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .btn-green:hover { transform: translateY(-1px); }
    .btn-ghost {
      background: transparent; color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .btn-ghost:hover { border-color: rgba(180,100,255,0.5); color: var(--purple-light); }
    .btn-sm { padding: 6px 14px; font-size: 10px; }
    .btn-full { width: 100%; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

    /* USERNAME OVERLAY */
    #usernameOverlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(14,4,26,0.96);
      display: flex; align-items: center; justify-content: center;
    }
    .overlay-box {
      background: var(--surface);
      border: 1px solid rgba(180,100,255,0.4);
      border-radius: 14px; padding: 40px;
      width: 360px; text-align: center;
      box-shadow: 0 0 60px rgba(140,60,220,0.25);
    }
    .overlay-box h2 {
      font-family: 'Nunito', sans-serif; font-weight: 900;
      font-size: 1.5rem; margin-bottom: 6px; color: #fff;
      letter-spacing: 2px;
    }
    .overlay-box p { font-size: 12px; color: var(--text-dim); margin-bottom: 24px; letter-spacing: 1px; }
    .gd-input {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(180,100,255,0.3); border-radius: 8px;
      color: var(--text); font-family: 'Nunito Sans', sans-serif;
      font-size: 14px; padding: 11px 14px; outline: none; margin-bottom: 10px;
      transition: border-color 0.15s;
    }
    .gd-input:focus { border-color: rgba(180,100,255,0.7); }
    .input-err { font-size: 11px; color: var(--accent); margin-bottom: 10px; min-height: 16px; }

    /* TUSOLENT */
    #tusolentOverlay {
      position: fixed; inset: 0; z-index: 99999;
      background: rgba(10,0,20,0.9);
      display: none; align-items: center; justify-content: center;
      cursor: pointer;
    }
    #tusolentOverlay.show { display: flex; }
    .tusolent-text {
      font-family: 'Nunito', sans-serif; font-weight: 900;
      font-size: clamp(3rem, 14vw, 11rem);
      color: #fff;
      text-align: center; letter-spacing: 6px;
      animation: tPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-shadow:
        0 0 20px #f5a623,
        0 0 60px rgba(245,166,35,0.5),
        0 0 120px rgba(233,69,96,0.3);
    }
    @keyframes tPop { 0%{transform:scale(0.2);opacity:0} 100%{transform:scale(1);opacity:1} }

    /* HOG BTN */
    .hog-btn {
      font-family: 'Nunito', sans-serif; font-weight: 900;
      font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
      padding: 12px 32px;
      border: none; border-radius: 8px;
      background: linear-gradient(135deg, #9b59b6, #6c3483);
      color: #f0e6ff;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(155,89,182,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
      transition: all 0.15s;
    }
    .hog-btn:hover { transform: scale(1.04); box-shadow: 0 6px 28px rgba(155,89,182,0.65); }

    /* MAIN */
    main { position: relative; z-index: 1; max-width: 1080px; margin: 0 auto; padding: 36px 24px; }

    /* HERO */
    .hero {
      text-align: center; margin-bottom: 48px;
      padding: 48px 20px 40px;
      background: linear-gradient(160deg, rgba(100,30,180,0.12), rgba(20,6,40,0.2));
      border-radius: 16px; border: 1px solid rgba(180,100,255,0.15);
      position: relative;
    }
    .hero h1 {
      font-family: 'Nunito', sans-serif; font-weight: 900;
      font-size: 4rem; letter-spacing: 5px; color: #fff;
      text-shadow: 0 0 40px rgba(180,100,255,0.5);
      margin-bottom: 10px;
    }
    .hero h1 span { color: var(--accent); }
    .hero p { font-size: 12px; color: var(--text-dim); letter-spacing: 3px; margin-bottom: 32px; text-transform: uppercase; }

    /* SECTION */
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 3px;
      color: var(--text-dim); text-transform: uppercase;
      margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* CREATE PANEL */
    .create-panel {
      background: var(--surface); border-radius: 12px;
      border: 1px solid var(--border); padding: 24px; margin-bottom: 36px;
    }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px,1fr)); gap: 14px; margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 9px; font-weight: 700;
      letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px;
    }
    .form-group input, .form-group select {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(180,100,255,0.2); border-radius: 7px;
      color: var(--text); font-family: 'Nunito Sans', sans-serif;
      font-size: 13px; padding: 9px 12px; outline: none; transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group select:focus { border-color: rgba(180,100,255,0.6); }
    .form-group select option { background: #1f0f3a; }
    .toggle-row { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .toggle-label { font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
    .toggle { position: relative; width: 42px; height: 23px; cursor: pointer; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: rgba(255,255,255,0.08); border-radius: 12px; border: 1px solid var(--border); transition: 0.2s; }
    .toggle input:checked + .toggle-slider { background: rgba(155,89,182,0.5); border-color: rgba(180,100,255,0.5); }
    .toggle-slider::before { content: ''; position: absolute; width: 15px; height: 15px; left: 3px; top: 3px; background: var(--text-dim); border-radius: 50%; transition: 0.2s; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(19px); background: var(--purple-light); }
    #passwordField { display: none; margin-bottom: 18px; }

    /* LOBBY LIST */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .lobby-list { display: flex; flex-direction: column; gap: 8px; }
    .lobby-card {
      background: var(--surface); border-radius: 10px;
      border: 1px solid var(--border); padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; transition: all 0.12s;
    }
    .lobby-card:hover { border-color: rgba(180,100,255,0.4); background: var(--surface2); transform: translateX(3px); }
    .lobby-info { flex: 1; }
    .lobby-name { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 14px; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
    .lobby-meta { display: flex; gap: 14px; flex-wrap: wrap; }
    .lobby-meta span { font-size: 11px; color: var(--text-dim); }
    .badge { font-size: 9px; font-weight: 700; letter-spacing: 1px; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; }
    .badge-open { background: rgba(0,200,83,0.12); color: #00e676; border: 1px solid rgba(0,200,83,0.25); }
    .badge-locked { background: rgba(245,166,35,0.12); color: #f5a623; border: 1px solid rgba(245,166,35,0.25); }
    .empty-state { text-align: center; padding: 50px 20px; color: var(--text-dim); font-size: 12px; letter-spacing: 1px; border: 1px dashed var(--border); border-radius: 10px; }
    .loading { text-align: center; padding: 36px; color: var(--text-dim); font-size: 11px; letter-spacing: 2px; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* MODALS */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 8000; display: none; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: var(--surface); border: 1px solid rgba(180,100,255,0.35); border-radius: 14px; padding: 30px; width: 330px; box-shadow: 0 0 40px rgba(140,60,220,0.2); }
    .modal-box h3 { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1rem; margin-bottom: 18px; letter-spacing: 1px; }
    .modal-err { font-size: 11px; color: var(--accent); margin-bottom: 10px; min-height: 14px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 6px; }
    .modal-actions .btn { flex: 1; }

    @media (max-width: 600px) {
      header { padding: 0 16px; }
      .hero h1 { font-size: 2.6rem; }
      .form-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="tusolentOverlay" onclick="hideTusolent()">
  <div class="tusolent-text">TUSOLENT</div>
</div>

<div id="usernameOverlay">
  <div class="overlay-box">
    <h2>GDBLITZ</h2>
    <p>enter your display name</p>
    <input class="gd-input" type="text" id="usernameInput" maxlength="20" placeholder="your name..." autocomplete="off" />
    <div class="input-err" id="usernameErr"></div>
    <button class="btn btn-primary btn-full" onclick="submitUsername()">ENTER</button>
  </div>
</div>

<div class="modal-overlay" id="passwordModal">
  <div class="modal-box">
    <h3>Password Required</h3>
    <input class="gd-input" type="password" id="passwordInput" placeholder="lobby password..." />
    <div class="modal-err" id="passwordErr"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('passwordModal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitPassword()">Join</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="adminModal">
  <div class="modal-box">
    <h3>Staff Login</h3>
    <div class="form-group" style="margin-bottom:12px">
      <label>Username</label>
      <input class="gd-input" type="text" id="adminUsername" placeholder="username..." />
    </div>
    <div class="form-group" style="margin-bottom:8px">
      <label>Password</label>
      <input class="gd-input" type="password" id="adminPassword" placeholder="password..." />
    </div>
    <div class="modal-err" id="adminErr"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('adminModal')">Cancel</button>
      <button class="btn btn-primary" onclick="adminLogin()">Login</button>
    </div>
  </div>
</div>

<header>
  <div class="logo">GD<span>BLITZ</span></div>
  <div class="header-right">
    <div class="user-badge" id="userBadge" style="display:none">
      <span>Playing as <strong id="displayName">—</strong></span>
      <button class="btn-tube btn-sm" onclick="changeName()">Change</button>
    </div>
    <button class="btn-tube" onclick="openModal('adminModal')">Staff</button>
  </div>
</header>

<main>
  <div class="hero">
    <h1>GD<span>BLITZ</span></h1>
    <p>Competitive Geometry Dash Design Battles</p>
    <button class="hog-btn" onclick="showTusolent()">HOG</button>
  </div>

  <div class="section-label">Create a Lobby</div>
  <div class="create-panel">
    <div class="form-grid">
      <div class="form-group">
        <label>Lobby Name</label>
        <input type="text" id="lobbyName" maxlength="32" placeholder="name..." />
      </div>
      <div class="form-group">
        <label>Max Players</label>
        <input type="number" id="maxPlayers" min="2" max="50" value="16" />
      </div>
      <div class="form-group">
        <label>Rounds</label>
        <input type="number" id="roundCount" min="1" max="10" value="3" />
      </div>
      <div class="form-group">
        <label>Build Time (min)</label>
        <input type="number" id="buildTime" min="10" max="120" value="30" />
      </div>
      <div class="form-group">
        <label>Upload Time (min)</label>
        <input type="number" id="uploadTime" min="1" max="5" value="3" />
      </div>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Private</span>
      <label class="toggle">
        <input type="checkbox" id="isPrivate" onchange="togglePrivate(this)">
        <span class="toggle-slider"></span>
      </label>
      <span id="privacyLabel" class="toggle-label" style="color:#00e676">Public</span>
    </div>
    <div id="passwordField">
      <div class="form-group">
        <label>Lobby Password</label>
        <input type="password" id="lobbyPassword" maxlength="32" placeholder="set a password..." />
      </div>
    </div>
    <button class="btn btn-green btn-full" onclick="createLobby()" style="padding:13px;font-size:13px">CREATE LOBBY</button>
  </div>

  <div class="section-header">
    <div class="section-label" style="margin:0">Public Lobbies</div>
    <button class="btn btn-ghost btn-sm" onclick="loadLobbies()">Refresh</button>
  </div>
  <div class="lobby-list" id="lobbyList">
    <div class="loading">Loading...</div>
  </div>
</main>

<script>
  const API = 'https://gdblitz-backend.onrender.com';
  let sessionId = sessionStorage.getItem('gdblitz_session') || Math.random().toString(36).substring(2,10);
  sessionStorage.setItem('gdblitz_session', sessionId);
  let pendingLobby = null;

  // GEOMETRIC BG
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let shapes = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initShapes() {
    shapes = [];
    const types = ['triangle', 'square', 'diamond', 'circle'];
    const colors = ['#9b59b6','#8e44ad','#6c3483','#a569bd','#d7bde2','#e94560','#00d4ff'];
    for (let i = 0; i < 22; i++) {
      shapes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: 12 + Math.random() * 36,
        type: types[Math.floor(Math.random() * types.length)],
        color: colors[Math.floor(Math.random() * colors.length)],
        speed: 0.15 + Math.random() * 0.4,
        rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.008,
        alpha: 0.08 + Math.random() * 0.18
      });
    }
  }

  function drawShape(s) {
    ctx.save();
    ctx.globalAlpha = s.alpha;
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 1.5;
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rot);
    ctx.beginPath();
    if (s.type === 'triangle') {
      ctx.moveTo(0, -s.size); ctx.lineTo(s.size * 0.866, s.size * 0.5); ctx.lineTo(-s.size * 0.866, s.size * 0.5); ctx.closePath();
    } else if (s.type === 'square') {
      ctx.rect(-s.size/2, -s.size/2, s.size, s.size);
    } else if (s.type === 'diamond') {
      ctx.moveTo(0, -s.size); ctx.lineTo(s.size*0.6, 0); ctx.lineTo(0, s.size); ctx.lineTo(-s.size*0.6, 0); ctx.closePath();
    } else {
      ctx.arc(0, 0, s.size/2, 0, Math.PI*2);
    }
    ctx.stroke();
    ctx.restore();
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    shapes.forEach(s => {
      s.y -= s.speed;
      s.rot += s.rotSpeed;
      if (s.y < -60) { s.y = canvas.height + 60; s.x = Math.random() * canvas.width; }
      drawShape(s);
    });
    requestAnimationFrame(animate);
  }

  resizeCanvas(); initShapes(); animate();
  window.addEventListener('resize', () => { resizeCanvas(); initShapes(); });

  // INIT
  window.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem('gdblitz_username');
    if (saved) {
      document.getElementById('usernameOverlay').style.display = 'none';
      document.getElementById('displayName').textContent = saved;
      document.getElementById('userBadge').style.display = 'flex';
    }
    loadLobbies();
    const params = new URLSearchParams(location.search);
    const joinCode = params.get('join');
    if (joinCode && saved) attemptJoinByCode(joinCode);
    else if (joinCode) sessionStorage.setItem('pendingJoin', joinCode);
  });

  window.submitUsername = async function() {
    const val = document.getElementById('usernameInput').value.trim();
    const err = document.getElementById('usernameErr');
    if (!val || val.length < 2) { err.textContent = 'At least 2 characters.'; return; }
    if (val.length > 20) { err.textContent = 'Max 20 characters.'; return; }
    sessionStorage.setItem('gdblitz_username', val);
    document.getElementById('usernameOverlay').style.display = 'none';
    document.getElementById('displayName').textContent = val;
    document.getElementById('userBadge').style.display = 'flex';
    const pending = sessionStorage.getItem('pendingJoin');
    if (pending) { sessionStorage.removeItem('pendingJoin'); attemptJoinByCode(pending); }
  };

  window.changeName = function() { sessionStorage.removeItem('gdblitz_username'); location.reload(); };
  document.getElementById('usernameInput').addEventListener('keydown', e => { if (e.key === 'Enter') submitUsername(); });

  window.showTusolent = function() { document.getElementById('tusolentOverlay').classList.add('show'); };
  window.hideTusolent = function() { document.getElementById('tusolentOverlay').classList.remove('show'); };

  window.togglePrivate = function(cb) {
    document.getElementById('passwordField').style.display = cb.checked ? 'block' : 'none';
    const lbl = document.getElementById('privacyLabel');
    lbl.textContent = cb.checked ? 'Private' : 'Public';
    lbl.style.color = cb.checked ? '#e94560' : '#00e676';
  };

  window.openModal = id => document.getElementById(id).classList.add('active');
  window.closeModal = id => document.getElementById(id).classList.remove('active');

  window.adminLogin = async function() {
    const username = document.getElementById('adminUsername').value.trim();
    const password = document.getElementById('adminPassword').value;
    const err = document.getElementById('adminErr');
    if (!username || !password) { err.textContent = 'Fill in all fields.'; return; }
    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { err.textContent = data.error || 'Login failed.'; return; }
      sessionStorage.setItem('gdblitz_admin_token', data.token);
      sessionStorage.setItem('gdblitz_admin_role', data.role);
      sessionStorage.setItem('gdblitz_admin_username', data.username);
      closeModal('adminModal');
      window.location.href = 'admin.html';
    } catch(e) { err.textContent = 'Connection error.'; }
  };

  document.getElementById('adminPassword').addEventListener('keydown', e => { if (e.key === 'Enter') adminLogin(); });

  window.loadLobbies = async function() {
    const list = document.getElementById('lobbyList');
    list.innerHTML = '<div class="loading">Loading...</div>';
    try {
      const res = await fetch(`${API}/lobbies`);
      const lobbies = await res.json();
      if (!lobbies.length) { list.innerHTML = '<div class="empty-state">No open lobbies — create one above</div>'; return; }
      list.innerHTML = lobbies.map(l => `
        <div class="lobby-card" onclick="joinLobby('${l.id}', ${!!l.password_hash})">
          <div class="lobby-info">
            <div class="lobby-name">
              ${l.name}
              <span class="badge ${l.password_hash ? 'badge-locked' : 'badge-open'}">${l.password_hash ? 'Password' : 'Open'}</span>
            </div>
            <div class="lobby-meta">
              <span>${l.player_count}/${l.max_players} players</span>
              <span>${l.rounds} rounds</span>
              <span>${l.build_time} min build</span>
              <span>Host: ${l.host_name}</span>
            </div>
          </div>
          <button class="btn btn-primary btn-sm">Join</button>
        </div>`).join('');
    } catch(e) { list.innerHTML = '<div class="empty-state">Could not load lobbies.</div>'; }
  };

  window.createLobby = async function() {
    const username = sessionStorage.getItem('gdblitz_username');
    if (!username) { alert('Enter your name first.'); return; }
    const name = document.getElementById('lobbyName').value.trim() || `${username}'s Lobby`;
    const maxPlayers = parseInt(document.getElementById('maxPlayers').value) || 16;
    const rounds = parseInt(document.getElementById('roundCount').value) || 3;
    const buildTime = parseInt(document.getElementById('buildTime').value) || 30;
    const uploadTime = parseInt(document.getElementById('uploadTime').value) || 3;
    const isPrivate = document.getElementById('isPrivate').checked;
    const password = document.getElementById('lobbyPassword').value.trim();
    if (maxPlayers < 2 || maxPlayers > 50) { alert('Max players: 2-50.'); return; }
    if (rounds < 1 || rounds > 10) { alert('Rounds: 1-10.'); return; }
    if (buildTime < 10 || buildTime > 120) { alert('Build time: 10-120 min.'); return; }
    if (uploadTime < 1 || uploadTime > 5) { alert('Upload time: 1-5 min.'); return; }
    try {
      const res = await fetch(`${API}/lobbies`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, host_name: username, max_players: maxPlayers, rounds, build_time: buildTime, upload_time: uploadTime, is_private: isPrivate, password: password||null, session_id: sessionId })
      });
      const data = await res.json();
      if (!res.ok) { alert(data.error || 'Failed to create lobby.'); return; }
      sessionStorage.setItem('gdblitz_player_id', data.player.id);
      window.location.href = `lobby.html?id=${data.lobby.id}`;
    } catch(e) { alert('Connection error.'); }
  };

  window.joinLobby = function(lobbyId, hasPassword) {
    if (!sessionStorage.getItem('gdblitz_username')) { alert('Enter your name first.'); return; }
    if (hasPassword) {
      pendingLobby = lobbyId;
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordErr').textContent = '';
      openModal('passwordModal');
    } else { goToLobby(lobbyId, null); }
  };

  window.submitPassword = function() {
    if (!pendingLobby) return;
    const password = document.getElementById('passwordInput').value.trim();
    if (!password) { document.getElementById('passwordErr').textContent = 'Enter the password.'; return; }
    closeModal('passwordModal');
    goToLobby(pendingLobby, password);
  };

  document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') submitPassword(); });

  async function attemptJoinByCode(code) {
    try {
      const res = await fetch(`${API}/lobbies/code/${code}`);
      const data = await res.json();
      if (!res.ok) { alert('Lobby not found.'); return; }
      window.joinLobby(data.id, data.hasPassword);
    } catch(e) { alert('Connection error.'); }
  }

  function goToLobby(id, password) {
    sessionStorage.setItem('gdblitz_lobby_id', id);
    if (password) sessionStorage.setItem('gdblitz_lobby_password', password);
    window.location.href = `lobby.html?id=${id}`;
  }

  setInterval(loadLobbies, 10000);
</script>
</body>
</html>
